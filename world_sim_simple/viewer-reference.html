<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗺️ World Simulator Map Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        header {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .status {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .status-item {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        #connection-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .connected { color: #4ade80; }
        .disconnected { color: #f87171; }
        
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        .sidebar {
            width: 300px;
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }
        
        .right-sidebar {
            width: 350px;
        }
        
        .peasant-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        
        .peasant-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }
        
        .peasant-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(-2px);
        }
        
        .peasant-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        
        .peasant-status {
            font-size: 1.2rem;
        }
        
        .peasant-info {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0.3rem 0.5rem;
            font-size: 0.85rem;
        }
        
        .peasant-label {
            opacity: 0.7;
        }
        
        .peasant-value {
            font-family: monospace;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 2px;
        }
        
        .progress-fill {
            height: 100%;
            transition: width 0.3s;
        }
        
        .progress-satiety {
            background: linear-gradient(90deg, #ef4444, #f97316);
        }
        
        .progress-energy {
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
        }
        
        .map-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            position: relative;
        }
        
        canvas {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            background: #2a4a2a;
            cursor: crosshair;
        }
        
        .controls {
            margin-bottom: 1.5rem;
        }
        
        .controls h2 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            opacity: 0.9;
        }
        
        button {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 0.25rem;
        }
        
        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }
        
        .speed-btn {
            padding: 0.4rem 0.8rem;
            margin: 0.2rem;
            font-size: 0.9rem;
        }
        
        .speed-btn.active {
            background: rgba(59, 130, 246, 0.5);
            border-color: rgba(59, 130, 246, 0.8);
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.75rem;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 0.8rem;
            opacity: 0.8;
        }
        
        .legend {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }
        
        .legend h3 {
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0.25rem 0;
            font-size: 0.9rem;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 0.5rem;
            border-radius: 6px;
            font-size: 0.85rem;
            pointer-events: none;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <header>
        <h1>🗺️ World Simulator Map Viewer</h1>
        <div class="status">
            <div id="connection-status" class="status-item disconnected">
                <span class="status-dot">⚫</span>
                <span>Disconnected</span>
            </div>
            <div class="status-item">
                <span>Tick: <span id="tick-count">0</span></span>
            </div>
            <div class="status-item">
                <span>FPS: <span id="fps">0</span></span>
            </div>
            <div class="status-item">
                <span>Pack: <span id="pack-info">Loading...</span></span>
            </div>
        </div>
    </header>
    
    <div class="container">
        <div class="sidebar">
            <div class="controls">
                <h2>🎮 Simulation Controls</h2>
                <button onclick="toggleSimulation()">⏯️ Play/Pause</button>
                <div style="margin: 0.5rem 0;">
                    <div style="margin-bottom: 0.5rem;">Speed (ticks/sec):</div>
                    <button id="speed-1" class="speed-btn" onclick="setTickRate(1)">1 tick/s</button>
                    <button id="speed-2" class="speed-btn" onclick="setTickRate(2)">2 ticks/s</button>
                    <button id="speed-5" class="speed-btn" onclick="setTickRate(5)">5 ticks/s</button>
                    <button id="speed-10" class="speed-btn active" onclick="setTickRate(10)">10 ticks/s</button>
                    <button id="speed-20" class="speed-btn" onclick="setTickRate(20)">20 ticks/s</button>
                </div>
                <button onclick="respawnPeasants()" style="background: #dc2626;">🔄 Reset Peasants</button>
            </div>
            
            <div class="controls">
                <h2>🔍 View Controls</h2>
                <button onclick="zoomIn()">🔍+ Zoom In</button>
                <button onclick="zoomOut()">🔍- Zoom Out</button>
                <button onclick="resetView()">🔄 Reset View</button>
            </div>
            
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="unit-count">0</div>
                    <div class="stat-label">👥 Units</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="tree-count">0</div>
                    <div class="stat-label">🌲 Trees</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="berry-count">0</div>
                    <div class="stat-label">🫐 Berries</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="building-count">0</div>
                    <div class="stat-label">🏠 Buildings</div>
                </div>
            </div>
            
            <div class="legend">
                <h3>📋 Map Legend</h3>
                <div class="legend-item">
                    <div class="legend-color" style="background: #3a5f3a;"></div>
                    <span>🌱 Grass</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #4a90e2;"></div>
                    <span>💧 Water</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #2c5aa0;"></div>
                    <span>🌊 Deep Water</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #f4e4bc;"></div>
                    <span>🏖️ Sand</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #8b8680;"></div>
                    <span>🪨 Stone</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #2d4a2b;"></div>
                    <span>🌲 Tree</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #8b7355;"></div>
                    <span>🧱 Wall</span>
                </div>
            </div>
        </div>
        
        <div class="map-container">
            <canvas id="mapCanvas"></canvas>
            <div class="tooltip" id="tooltip"></div>
        </div>
        
        <div class="sidebar right-sidebar">
            <h2>👥 Peasant Details</h2>
            <div id="peasantList" class="peasant-list">
                <!-- Peasant details will be populated here -->
            </div>
        </div>
    </div>
    
    <script>
        // Configuration
        const TILE_SIZE = 12;
        const MAP_SIZE = 64;
        
        // Tile configuration with colors and emojis (lowercase keys to match server)
        const TILE_CONFIG = {
            grass: { color: '#3a5f3a', emoji: '🌱' },
            water: { color: '#4a90e2', emoji: '💧' },
            deepwater: { color: '#2c5aa0', emoji: '🌊' },
            sand: { color: '#f4e4bc', emoji: '🏖️' },
            stone: { color: '#8b8680', emoji: '🪨' },
            tree: { color: '#2d4a2b', emoji: '🌲' },
            berry: { color: '#3a5f3a', emoji: '🫐' },
            wall: { color: '#8b7355', emoji: '🧱' },
            floor: { color: '#a0826d', emoji: '🟫' },
            door: { color: '#8b6f47', emoji: '🚪' },
            storage: { color: '#696969', emoji: '📦' },
            workshop: { color: '#696969', emoji: '🔨' },
            empty: { color: '#1a1a1a', emoji: '⬛' },
            blocked: { color: '#8b0000', emoji: '🚫' },
            ore: { color: '#696969', emoji: '⛏️' }
        };
        
        // Canvas setup
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = MAP_SIZE * TILE_SIZE;
        canvas.height = MAP_SIZE * TILE_SIZE;
        
        // State
        let ws = null;
        let mapData = [];
        let entities = [];
        let cachedEntities = []; // Cache to prevent units from disappearing
        let lastEntityUpdate = 0; // Track when we last got valid entity data
        let previousEntityPositions = {}; // Track previous positions for movement detection
        let entityMovementStates = {}; // Track movement state over time to prevent flickering
        let zoom = 1;
        let offsetX = 0;
        let offsetY = 0;
        
        // Initialize map with empty tiles
        for (let y = 0; y < MAP_SIZE; y++) {
            mapData[y] = [];
            for (let x = 0; x < MAP_SIZE; x++) {
                mapData[y][x] = 'grass';
            }
        }
        
        // WebSocket connection
        function connectWebSocket() {
            // Use the default port from the launch script (11748)
            const wsPort = 11748;
            ws = new WebSocket(`ws://localhost:${wsPort}`);

            ws.onopen = () => {
                console.log('Connected to simulation via three-tier architecture');
                updateConnectionStatus(true);
                // Send initial connection message
                ws.send(JSON.stringify({ type: 'Connect', client_id: 'web-viewer' }));
                // Request current state
                ws.send(JSON.stringify({ type: 'RequestState' }));
                console.log('Connected to three-tier architecture');
            };
            
            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                handleMessage(msg);
            };
            
            ws.onclose = () => {
                console.log('Disconnected from simulation');
                updateConnectionStatus(false);
                setTimeout(connectWebSocket, 3000); // Reconnect after 3 seconds
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }
        
        function handleMessage(msg) {
            console.log('Received message:', msg.type, msg);

            switch(msg.type) {
                case 'Welcome':
                    console.log('Welcome message received:', msg.client_id);
                    break;

                case 'GameState':
                    console.log('GameState message received:', msg);
                    console.log('GameState payload:', msg.payload);
                    console.log('GameState state:', msg.state);

                    // Handle both new IPC format (payload.data) and old WebSocket format (state)
                    let gameStateData = null;
                    if (msg.payload && msg.payload.data) {
                        // New IPC format from simulator
                        gameStateData = msg.payload.data;
                        console.log('Using new IPC format');
                    } else if (msg.state) {
                        // Old WebSocket format from viewer
                        gameStateData = msg.state;
                        console.log('Using old WebSocket format');
                    } else {
                        console.error('GameState data is undefined!', msg);
                        break;
                    }

                    updateGameState(gameStateData);
                    break;

                case 'PackDefinitions':
                    console.log('PackDefinitions message received:', msg);

                    // Handle both new IPC format (payload.data) and old WebSocket format
                    let packData = null;
                    if (msg.payload && msg.payload.data) {
                        // New IPC format from simulator
                        packData = msg.payload.data;
                        console.log('Using new IPC format for PackDefinitions');
                    } else if (msg.state) {
                        // Old WebSocket format from viewer
                        packData = msg.state;
                        console.log('Using old WebSocket format for PackDefinitions');
                    } else if (msg.payload) {
                        // Fallback: payload might be the data itself
                        packData = msg.payload;
                        console.log('Using fallback payload format for PackDefinitions');
                    } else {
                        console.error('PackDefinitions data is undefined!', msg);
                        break;
                    }

                    handlePackDefinitions(packData);
                    break;

                case 'Heartbeat':
                    console.log('Heartbeat received from', msg.payload?.sender);
                    break;

                case 'TileUpdate':
                    updateTile(msg.x, msg.y, msg.tile_type);
                    break;

                case 'TickUpdate':
                    document.getElementById('tick-count').textContent = msg.tick;
                    break;

                case 'Error':
                    console.error('Server error:', msg.message);
                    break;

                default:
                    console.log('Unhandled message type:', msg.type);
                    break;
            }
        }
        
        function updateGameState(gameState) {
            console.log('Received game state:', gameState);

            // Update map - handle both tile map and individual tiles
            if (gameState.tiles) {
                if (Array.isArray(gameState.tiles)) {
                    // Handle 2D array format
                    mapData = gameState.tiles;
                    console.log('Map data updated as 2D array, first row:', mapData[0]);
                } else if (typeof gameState.tiles === 'object') {
                    // Handle object format with key-value pairs
                    // Convert existing mapData to use the new tile data
                    for (const [key, tileData] of Object.entries(gameState.tiles)) {
                        const [x, y] = key.split(',').map(Number);
                        if (mapData[y] && mapData[y][x] !== undefined) {
                            mapData[y][x] = tileData.type || 'grass';
                        }
                    }
                    console.log('Map data updated from object format');
                }
            }

            // Update entities - handle both old and new formats
            if (gameState.entities && gameState.entities.length > 0) {
                console.log('Entities received:', gameState.entities.length);

                entities = gameState.entities.map(entity => {
                    // Debug the entity structure
                    console.log('Raw entity structure:', entity);

                    // Check if this is the old format (direct x,y) or new format (position.x, position.y)
                    let x, y, health, max_health, hunger, energy, morale, display_name;

                    if (entity.position !== undefined) {
                        // New EntitySnapshot format
                        x = entity.position.x || 0;
                        y = entity.position.y || 0;
                        health = entity.components?.health || 100;
                        max_health = entity.components?.max_health || 100;
                        hunger = entity.components?.hunger || 100;
                        energy = entity.components?.energy || 100;
                        morale = entity.components?.morale || 100;
                        display_name = entity.components?.display_name || getEntityName(entity.entity_type);
                    } else {
                        // Old format
                        x = entity.x || 0;
                        y = entity.y || 0;
                        health = entity.data?.health || 100;
                        max_health = entity.data?.max_health || 100;
                        hunger = entity.data?.hunger || 100;
                        energy = entity.data?.energy || 100;
                        morale = entity.data?.morale || 100;
                        display_name = entity.data?.display_name || getEntityName(entity.entity_type);
                    }

                    const entityData = {
                        id: entity.id,
                        x: x,
                        y: y,
                        entity_type: entity.entity_type,
                        health: health,
                        max_health: max_health,
                        hunger: hunger,
                        energy: energy,
                        morale: morale,
                        display_name: display_name
                    };

                    console.log('Converted entity:', entityData);
                    return entityData;
                });

                // Cache valid entity data
                cachedEntities = [...entities];
                lastEntityUpdate = Date.now();
                updateStats();
                updatePeasantDetails();
            } else if (Date.now() - lastEntityUpdate < 5000) {
                // Use cached entities if we haven't received valid data recently
                entities = [...cachedEntities];
                console.log('Using cached entities:', cachedEntities.length);
            }

            // Update tick
            if (gameState.tick !== undefined) {
                document.getElementById('tick-count').textContent = gameState.tick;
                currentTick = gameState.tick;
            }

            // Update global state
            if (gameState.global_state) {
                const globalState = gameState.global_state;
                running = globalState.is_running;
                updateSpeedDisplay();

                if (globalState.population) {
                    populationEl.textContent = globalState.population.total || 0;
                }

                if (globalState.resources) {
                    // Update resource displays
                    Object.entries(globalState.resources).forEach(([resource, amount]) => {
                        const element = document.querySelector(`[data-resource="${resource}"]`);
                        if (element) {
                            element.textContent = amount;
                        }
                    });
                }
            }
        }
        
        function updateTile(x, y, tileType) {
            if (mapData[y] && mapData[y][x] !== undefined) {
                mapData[y][x] = tileType;
            }
        }
        
        // Handle pack definitions from the new architecture
        function handlePackDefinitions(packDefs) {
            console.log('Received pack definitions:', packDefs);

            // Update tile configurations from pack definitions
            if (packDefs.visual_registry && packDefs.visual_registry.tiles) {
                for (const [tileId, tileVisual] of Object.entries(packDefs.visual_registry.tiles)) {
                    if (tileVisual.emoji) {
                        TILE_CONFIG[tileId] = {
                            color: tileVisual.color || '#3a5f3a',
                            emoji: tileVisual.emoji
                        };
                        console.log(`Updated tile config for ${tileId}:`, TILE_CONFIG[tileId]);
                    }
                }
            }

            // Store entity visuals for enhanced rendering
            if (packDefs.visual_registry && packDefs.visual_registry.entities) {
                window.packEntities = {};
                for (const [entityId, entityVisual] of Object.entries(packDefs.visual_registry.entities)) {
                    window.packEntities[entityId] = entityVisual;
                    console.log(`Stored entity visual for ${entityId}:`, entityVisual);
                }
            }

            // Update pack info in UI
            if (packDefs.packs && packDefs.packs.length > 0) {
                const packInfo = packDefs.packs[0];
                document.getElementById('pack-info').textContent = `${packInfo.name} v${packInfo.version}`;
                console.log(`Loaded pack: ${packInfo.name} v${packInfo.version}`);
            }

            // Update legend with pack-defined tiles
            updateLegendWithPackData(packDefs);
        }

        // Update map legend with pack-defined tiles
        function updateLegendWithPackData(packDefs) {
            if (!packDefs.visual_registry || !packDefs.visual_registry.tiles) return;

            const legendContainer = document.querySelector('.legend');
            if (!legendContainer) return;

            // Get existing legend items to avoid duplicates
            const existingItems = new Set();
            legendContainer.querySelectorAll('.legend-item').forEach(item => {
                const text = item.textContent.trim();
                existingItems.add(text);
            });

            // Add pack-defined tiles to legend
            for (const [tileId, tileVisual] of Object.entries(packDefs.visual_registry.tiles)) {
                const legendText = `${tileVisual.emoji || '⬛'} ${tileVisual.name || tileId}`;
                if (!existingItems.has(legendText)) {
                    const legendItem = document.createElement('div');
                    legendItem.className = 'legend-item';
                    legendItem.innerHTML = `
                        <div class="legend-color" style="background: ${tileVisual.color || '#3a5f3a'};"></div>
                        <span>${legendText}</span>
                    `;
                    legendContainer.appendChild(legendItem);
                }
            }
        }

        // Helper function to get entity name from entity type
        function getEntityName(entityType) {
            const entityNames = {
                'Worker': 'Peasant',
                'Unit': 'Peasant',
                'Tree': 'Tree',
                'BerryBush': 'Berry Bush',
                'Stone': 'Stone',
                'IronOre': 'Iron Ore'
            };
            return entityNames[entityType] || entityType || 'Unknown';
        }

        function updateEntities(newEntities) {
            if (newEntities && newEntities.length > 0) {
                entities = newEntities;
                // Cache valid entity data
                cachedEntities = [...newEntities];
                lastEntityUpdate = Date.now();
            } else if (Date.now() - lastEntityUpdate < 5000) {
                // Use cached entities if we haven't received valid data recently
                entities = [...cachedEntities];
            }
            updateStats();
            updatePeasantDetails();
        }
        
        function render() {
            // Store current canvas state to prevent flicker
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // First pass: Draw all tile backgrounds
            for (let y = 0; y < MAP_SIZE; y++) {
                for (let x = 0; x < MAP_SIZE; x++) {
                    const tileType = mapData[y][x];
                    const config = TILE_CONFIG[tileType] || TILE_CONFIG.empty || { color: '#3a5f3a' };
                    
                    // Draw tile background color
                    ctx.fillStyle = config.color;
                    ctx.fillRect(
                        x * TILE_SIZE + offsetX,
                        y * TILE_SIZE + offsetY,
                        TILE_SIZE,
                        TILE_SIZE
                    );
                    
                    // Draw subtle grid lines
                    ctx.strokeStyle = 'rgba(0, 0, 0, 0.05)';
                    ctx.lineWidth = 0.5;
                    ctx.strokeRect(
                        x * TILE_SIZE + offsetX,
                        y * TILE_SIZE + offsetY,
                        TILE_SIZE,
                        TILE_SIZE
                    );
                }
            }
            
            // Second pass: Draw feature tiles (trees, berries, etc.) as emojis
            ctx.font = `${TILE_SIZE - 2}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            for (let y = 0; y < MAP_SIZE; y++) {
                for (let x = 0; x < MAP_SIZE; x++) {
                    const tileType = mapData[y][x];
                    
                    // Only draw emojis for actual features, not terrain
                    let emoji = null;
                    switch(tileType) {
                        case 'tree':
                            emoji = '🌲';
                            break;
                        case 'berry':
                            emoji = '🫐';
                            break;
                        case 'ore':
                            emoji = '⛏️';
                            break;
                        case 'wall':
                            emoji = '🧱';
                            break;
                        case 'door':
                            emoji = '🚪';
                            break;
                        case 'storage':
                            emoji = '📦';
                            break;
                        case 'workshop':
                            emoji = '🔨';
                            break;
                        // Don't draw emojis for grass, water, sand, stone - just colors
                    }
                    
                    if (emoji) {
                        ctx.fillStyle = 'black';
                        ctx.fillText(
                            emoji,
                            x * TILE_SIZE + TILE_SIZE / 2 + offsetX,
                            y * TILE_SIZE + TILE_SIZE / 2 + offsetY
                        );
                    }
                }
            }
            
            // Third pass: Draw entities (units, etc.) on top
            ctx.font = `${TILE_SIZE - 1}px Arial`;
            
            // Use entities or cached entities to ensure units always appear
            const entitiesToDraw = entities.length > 0 ? entities : cachedEntities;
            
            // Sort entities by y position to ensure proper layering (higher y rendered last)
            const sortedEntities = [...entitiesToDraw].sort((a, b) => a.y - b.y);
            
            console.log('Rendering', sortedEntities.length, 'entities:', sortedEntities);
            sortedEntities.forEach((entity, index) => {
                const x = entity.x * TILE_SIZE + TILE_SIZE / 2 + offsetX;
                const y = entity.y * TILE_SIZE + TILE_SIZE / 2 + offsetY;

                console.log(`Drawing entity ${entity.id} at (${entity.x}, ${entity.y}) -> canvas (${x}, ${y})`);

                let emoji = null;

                // Use pack-defined entity visuals if available
                let entityVisual = null;
                if (window.packEntities && entity.entity_type) {
                    entityVisual = window.packEntities[entity.entity_type.toLowerCase()] ||
                                   window.packEntities[entity.entity_type];
                }

                if (entityVisual && entityVisual.emoji) {
                    emoji = entityVisual.emoji;
                } else {
                    // Fallback to hardcoded logic for compatibility
                    switch(entity.entity_type) {
                        case 'Worker':
                        case 'Unit':
                        case 'worker':
                        case 'unit':
                            // Initialize movement state if not exists
                            if (!entityMovementStates[entity.id]) {
                                entityMovementStates[entity.id] = {
                                    state: 'standing',
                                    counter: 0
                                };
                            }

                            // Check if the entity is moving by comparing with previous position
                            const prevPos = previousEntityPositions[entity.id];
                            let isMoving = false;

                            if (prevPos) {
                                isMoving = (entity.x !== prevPos.x || entity.y !== prevPos.y);
                            }

                            // Update movement state with smoothing to prevent flickering
                            const moveState = entityMovementStates[entity.id];
                            if (isMoving) {
                                if (moveState.state === 'standing') {
                                    moveState.counter++;
                                    if (moveState.counter >= 2) { // Need 2 frames of movement to switch
                                        moveState.state = 'walking';
                                        moveState.counter = 0;
                                    }
                                } else {
                                    moveState.counter = 0; // Reset counter while walking
                                }
                            } else {
                                if (moveState.state === 'walking') {
                                    moveState.counter++;
                                    if (moveState.counter >= 3) { // Need 3 frames of stillness to switch
                                        moveState.state = 'standing';
                                        moveState.counter = 0;
                                    }
                                } else {
                                    moveState.counter = 0; // Reset counter while standing
                                }
                            }

                            // Determine emoji based on movement state and visual states
                            if (entityVisual && entityVisual.visual_states) {
                                // Use visual states for workers (working, eating, sleeping, etc.)
                                const healthPercent = (entity.health || 100) / (entity.max_health || 100);
                                if (healthPercent < 0.3) {
                                    emoji = entityVisual.visual_states.sleeping?.emoji || '😴';
                                } else if (entity.energy && entity.energy < 50) {
                                    emoji = entityVisual.visual_states.sleeping?.emoji || '😴';
                                } else if (entity.hunger && entity.hunger < 50) {
                                    emoji = entityVisual.visual_states.eating?.emoji || '🍽️';
                                } else if (moveState.state === 'walking') {
                                    emoji = '🚶';
                                } else {
                                    emoji = entityVisual.visual_states.idle?.emoji || '👨‍🌾';
                                }
                            } else {
                                // Fallback to simple movement-based emoji
                                emoji = moveState.state === 'walking' ? '🚶' : '👨‍🌾';
                            }

                            // Update previous position
                            previousEntityPositions[entity.id] = { x: entity.x, y: entity.y };

                            // Add slight offset for overlapping entities
                            const overlapOffset = index * 2;
                            break;
                        case 'Tree':
                        case 'tree':
                            emoji = '🌲';
                            break;
                        case 'BerryBush':
                        case 'Berry':
                        case 'berry':
                            // Check if berry bush has fruit (amount > 0)
                            if (entity.components?.amount !== undefined || entity.data?.amount !== undefined) {
                                const amount = entity.components?.amount || entity.data?.amount || 0;
                                emoji = amount > 0 ? '🫐' : '🌳';
                            } else {
                                emoji = '🌳'; // Default to empty if no data
                            }
                            break;
                        case 'Building':
                        case 'building':
                            emoji = '🏠';
                            break;
                        default:
                            // Fallback to entity-specific emoji if available
                            emoji = entity.emoji || '❓';
                            break;
                    }
                }
                
                if (emoji) {
                    // Check if coordinates are valid (ensure we always draw valid units)
                    if (!isNaN(x) && !isNaN(y) && x >= 0 && x <= canvas.width && y >= 0 && y <= canvas.height) {
                        // Save context to ensure state doesn't bleed
                        ctx.save();
                        
                        // Add a subtle shadow for entities to stand out
                        ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                        ctx.shadowBlur = 3;
                        ctx.shadowOffsetX = 1;
                        ctx.shadowOffsetY = 1;
                        
                        // For overlapping entities at same position, add small offset
                        let drawX = x;
                        let drawY = y;
                        
                        // Check for other entities at same position
                        const samePositionEntities = sortedEntities.filter(e => 
                            e.x === entity.x && e.y === entity.y && e.entity_type === entity.entity_type
                        );
                        
                        if (samePositionEntities.length > 1) {
                            const entityIndex = samePositionEntities.indexOf(entity);
                            // Offset overlapping entities slightly
                            drawX += (entityIndex - (samePositionEntities.length - 1) / 2) * 4;
                            drawY += (entityIndex % 2) * 2;
                        }
                        
                        // Ensure text settings are correct
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillStyle = 'black';
                        ctx.fillText(emoji, drawX, drawY);
                        
                        // Restore context to prevent state issues
                        ctx.restore();
                    } else {
                        console.warn('Invalid entity position:', entity);
                    }
                }
            });
            
            // Restore canvas state to prevent any issues
            ctx.restore();
        }
        
        function updateConnectionStatus(connected) {
            const status = document.getElementById('connection-status');
            if (connected) {
                status.className = 'status-item connected';
                status.innerHTML = '<span class="status-dot">🟢</span><span>Connected</span>';
            } else {
                status.className = 'status-item disconnected';
                status.innerHTML = '<span class="status-dot">🔴</span><span>Disconnected</span>';
            }
        }
        
        function updateStats() {
            const units = entities.filter(e =>
                e.entity_type === 'Worker' ||
                e.entity_type === 'Unit' ||
                e.entity_type === 'worker' ||
                e.entity_type === 'unit' ||
                e.entity_type === 'peasant'
            ).length;
            const trees = entities.filter(e =>
                e.entity_type === 'Tree' ||
                e.entity_type === 'tree'
            ).length;
            const berries = entities.filter(e =>
                e.entity_type === 'BerryBush' ||
                e.entity_type === 'Berry' ||
                e.entity_type === 'berry'
            ).length;
            const buildings = entities.filter(e =>
                e.entity_type === 'Building' ||
                e.entity_type === 'building' ||
                e.entity_type === 'House' ||
                e.entity_type === 'Storage'
            ).length;

            document.getElementById('unit-count').textContent = units;
            document.getElementById('tree-count').textContent = trees;
            document.getElementById('berry-count').textContent = berries;
            document.getElementById('building-count').textContent = buildings;
        }

        // Enhanced entity rendering with pack definition support
        function getEntityVisual(entity) {
            // Base entity type mapping
            const entityType = entity.entity_type?.toLowerCase() || 'unknown';

            // Check if we have pack-defined visuals for this entity
            if (window.packEntities && window.packEntities[entityType]) {
                const packVisual = window.packEntities[entityType];
                return {
                    emoji: packVisual.emoji || '❓',
                    color: packVisual.color || '#000000',
                    visual_states: packVisual.visual_states || {}
                };
            }

            // Fallback to default mappings
            switch(entityType) {
                case 'unit':
                case 'worker':
                case 'peasant':
                    return { emoji: '👤', color: '#8B4513', visual_states: {} };
                case 'tree':
                    return { emoji: '🌲', color: '#166534', visual_states: {} };
                case 'berry':
                case 'berry_bush':
                    return { emoji: '🫐', color: '#7C3AED', visual_states: {} };
                case 'building':
                    return { emoji: '🏠', color: '#DC2626', visual_states: {} };
                default:
                    return { emoji: '❓', color: '#6B7280', visual_states: {} };
            }
        }
        function toggleSimulation() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'PlayPause' }));
            }
        }
        
        function setSpeed(speed) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'SetSpeed', speed: speed }));
            }
        }
        
        function setTickRate(ticksPerSecond) {
            // The server runs at base 10 ticks/second
            // So to get X ticks/second, we need speed = X/10
            const speedMultiplier = ticksPerSecond / 10.0;
            
            // Update UI to show active button
            document.querySelectorAll('.speed-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`speed-${ticksPerSecond}`).classList.add('active');
            
            // Send speed multiplier to server
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'SetSpeed', speed: speedMultiplier }));
                console.log(`Setting simulation to ${ticksPerSecond} ticks/s (speed multiplier: ${speedMultiplier})`);
            }
        }
        
        function respawnPeasants() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                if (confirm('Reset all peasants? This will respawn them with fresh state.')) {
                    ws.send(JSON.stringify({ type: 'RespawnPeasants' }));
                    console.log('Sent respawn peasants request');
                }
            }
        }
        
        function zoomIn() {
            zoom *= 1.2;
            canvas.style.transform = `scale(${zoom})`;
        }
        
        function zoomOut() {
            zoom /= 1.2;
            canvas.style.transform = `scale(${zoom})`;
        }
        
        function resetView() {
            zoom = 1;
            offsetX = 0;
            offsetY = 0;
            canvas.style.transform = `scale(${zoom})`;
        }
        
        // Mouse interaction
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / (TILE_SIZE * zoom));
            const y = Math.floor((e.clientY - rect.top) / (TILE_SIZE * zoom));
            
            if (x >= 0 && x < MAP_SIZE && y >= 0 && y < MAP_SIZE) {
                const tooltip = document.getElementById('tooltip');
                tooltip.style.display = 'block';
                tooltip.style.left = e.clientX + 10 + 'px';
                tooltip.style.top = e.clientY + 10 + 'px';
                tooltip.innerHTML = `Position: (${x}, ${y})<br>Tile: ${mapData[y][x]}`;
            }
        });
        
        canvas.addEventListener('mouseleave', () => {
            document.getElementById('tooltip').style.display = 'none';
        });
        
        // Start animation loop with FPS limiting and counter
        let lastTime = 0;
        let frameCount = 0;
        let fpsTime = 0;
        const targetFPS = 30;
        const frameDelay = 1000 / targetFPS; // ~33ms per frame for 30 FPS
        
        function animate(currentTime) {
            if (!currentTime) currentTime = 0;
            const deltaTime = currentTime - lastTime;
            
            // Only render if enough time has passed for target FPS
            if (deltaTime >= frameDelay) {
                lastTime = currentTime - (deltaTime % frameDelay);
                
                // Update FPS counter
                frameCount++;
                if (currentTime - fpsTime >= 1000) {
                    document.getElementById('fps').textContent = frameCount;
                    frameCount = 0;
                    fpsTime = currentTime;
                }
                
                // Render the map
                render();
            }
            
            requestAnimationFrame(animate);
        }
        
        function updatePeasantDetails() {
            const peasantList = document.getElementById('peasantList');
            const peasants = entities.filter(e =>
                e.entity_type === 'Worker' ||
                e.entity_type === 'Unit' ||
                e.entity_type === 'worker' ||
                e.entity_type === 'unit' ||
                e.entity_type === 'peasant'
            );

            if (peasants.length === 0) {
                peasantList.innerHTML = '<div style="text-align: center; opacity: 0.7;">No peasants active</div>';
                return;
            }

            // Sort peasants by ID to maintain consistent ordering
            // First try to extract numeric ID, fallback to string comparison
            peasants.sort((a, b) => {
                // Try to extract numeric ID from peasant.id
                const idA = parseInt(a.id) || parseInt(String(a.id).match(/\d+/)?.[0]) || 0;
                const idB = parseInt(b.id) || parseInt(String(b.id).match(/\d+/)?.[0]) || 0;

                if (idA !== idB) {
                    return idA - idB;
                }

                // If IDs are the same, sort by position as fallback
                if (a.x !== b.x) return a.x - b.x;
                return a.y - b.y;
            });
            
            peasantList.innerHTML = peasants.map((peasant, index) => {
                // Determine movement state for display
                const moveState = entityMovementStates[peasant.id];
                const statusEmoji = moveState && moveState.state === 'walking' ? '🚶' : '🧍';
                const statusText = moveState && moveState.state === 'walking' ? 'Walking' : 'Standing';
                
                // Extract additional data from server using component-based structure
                const components = peasant.components || {};
                const peasantData = peasant.data || {};

                // Note: satiety represents fullness (100 = full, 0 = starving)
                const satiety = components.hunger !== undefined ? (100 - components.hunger) : (peasantData.hunger !== undefined ? (100 - peasantData.hunger) : 50);
                const energy = components.energy !== undefined ? components.energy : (peasantData.energy !== undefined ? peasantData.energy : 50);
                const health = components.health !== undefined ? components.health : (peasantData.health !== undefined ? peasantData.health : 100);
                const morale = components.morale !== undefined ? components.morale : (peasantData.morale !== undefined ? peasantData.morale : 70);

                // Get inventory from components or fallback to data
                const inventory = components.inventory || peasantData.inventory || [];
                const currentAction = components.current_action || peasantData.current_action || peasantData.action_state || 'Idle';
                const mindState = components.mind_state || peasantData.mind_state || peasantData.action_state || currentAction;

                // GOAP-specific data (from components or fallback)
                const goapGoal = components.goap_goal || peasantData.goap_goal || 'None';
                const goapAction = components.goap_action || peasantData.goap_action || 'None';
                const foodCount = components.food_count !== undefined ? components.food_count : (peasantData.food_count !== undefined ? peasantData.food_count : 0);
                const nearBerryBush = components.near_berry_bush !== undefined ? components.near_berry_bush : (peasantData.near_berry_bush || false);
                
                // Get mind state icon based on the state
                let mindIcon = '💤'; // Default idle
                if (mindState.includes('thinking') || mindState.includes('Thinking')) mindIcon = '🤔';
                else if (mindState.includes('searching') || mindState.includes('Searching')) mindIcon = '🔍';
                else if (mindState.includes('gathering') || mindState.includes('Gathering')) mindIcon = '🌾';
                else if (mindState.includes('working') || mindState.includes('Working')) mindIcon = '⚒️';
                else if (mindState.includes('eating') || mindState.includes('Eating')) mindIcon = '🍽️';
                else if (mindState.includes('resting') || mindState.includes('Resting')) mindIcon = '😴';
                else if (mindState.includes('going') || mindState.includes('Going')) mindIcon = '🎯';
                else if (mindState.includes('home') || mindState.includes('Home')) mindIcon = '🏠';
                else if (mindState.includes('storing') || mindState.includes('Storing')) mindIcon = '📦';
                else if (mindState.includes('building') || mindState.includes('Building')) mindIcon = '🔨';
                else if (mindState.includes('wandering') || mindState.includes('Wandering')) mindIcon = '🚶';
                else if (mindState.includes('looking') || mindState.includes('Looking')) mindIcon = '👀';
                
                return `
                    <div class="peasant-card">
                        <div class="peasant-header">
                            <span class="peasant-status">${statusEmoji}</span>
                            <span>Peasant ${index + 1}</span>
                            <span style="margin-left: auto;">${mindIcon}</span>
                        </div>
                        <div class="peasant-info">
                            <span class="peasant-label">Position:</span>
                            <span class="peasant-value">(${peasant.x}, ${peasant.y})</span>
                            
                            <span class="peasant-label">Movement:</span>
                            <span class="peasant-value">${statusText}</span>
                            
                            <span class="peasant-label">Mind State:</span>
                            <span class="peasant-value">${mindIcon} ${mindState}</span>
                            
                            <span class="peasant-label">GOAP Goal:</span>
                            <span class="peasant-value">${goapGoal}</span>
                            
                            <span class="peasant-label">GOAP Action:</span>
                            <span class="peasant-value">${goapAction} ${nearBerryBush ? '🫐' : ''}</span>
                            
                            <span class="peasant-label">Food Count:</span>
                            <span class="peasant-value">🍖 ${foodCount}</span>
                            
                            <span class="peasant-label">Satiety:</span>
                            <div>
                                <span class="peasant-value">${Math.round(satiety)}%</span>
                                <div class="progress-bar">
                                    <div class="progress-fill progress-satiety" style="width: ${satiety}%"></div>
                                </div>
                            </div>
                            
                            <span class="peasant-label">Energy:</span>
                            <div>
                                <span class="peasant-value">${Math.round(energy)}%</span>
                                <div class="progress-bar">
                                    <div class="progress-fill progress-energy" style="width: ${energy}%"></div>
                                </div>
                            </div>
                            
                            <span class="peasant-label">Inventory:</span>
                            <span class="peasant-value">${inventory.length > 0 ? 
                                inventory.map(item => {
                                    // Parse "ResourceType:count" format
                                    const parts = item.split(':');
                                    if (parts.length === 2) {
                                        const resource = parts[0];
                                        const count = parts[1];
                                        // Add emojis for resources
                                        const emoji = resource.includes('Wood') ? '🪵' : 
                                                     resource.includes('Food') ? '🍖' : 
                                                     resource.includes('Stone') ? '⛏️' : '';
                                        return `${emoji} ${count}`;
                                    }
                                    return item;
                                }).join(' ') : 'Empty'}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Initialize
        connectWebSocket();
        animate();
    </script>
</body>
