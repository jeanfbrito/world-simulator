<!DOCTYPE html>
<html>
<head>
    <title>Debug Test Client</title>
</head>
<body>
    <h1>WebSocket Debug Test</h1>
    <button id="connect">Connect</button>
    <button id="getInfo">Get System Info</button>
    <button id="getComponents">Get Components</button>
    <button id="validate">Validate State</button>
    <div id="output"></div>
    
    <script>
        let ws = null;
        const output = document.getElementById('output');
        
        function log(msg) {
            const p = document.createElement('p');
            p.textContent = `[${new Date().toISOString()}] ${msg}`;
            output.appendChild(p);
            console.log(msg);
        }
        
        document.getElementById('connect').onclick = () => {
            ws = new WebSocket('ws://localhost:8080');
            
            ws.onopen = () => {
                log('Connected to WebSocket');
                ws.send(JSON.stringify({ type: 'Connect', client_id: 'debug_client' }));
            };
            
            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                log(`Received: ${JSON.stringify(msg, null, 2)}`);
                
                // Store message for Playwright to read
                window.lastMessage = msg;
            };
            
            ws.onerror = (error) => {
                log(`Error: ${error}`);
            };
            
            ws.onclose = () => {
                log('Disconnected');
            };
        };
        
        document.getElementById('getInfo').onclick = () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'DebugGetSystemInfo' }));
            }
        };
        
        document.getElementById('getComponents').onclick = () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'DebugGetComponents' }));
            }
        };
        
        document.getElementById('validate').onclick = () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'DebugValidateState' }));
            }
        };
    </script>
</body>
</html>
