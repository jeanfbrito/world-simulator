openapi: 3.0.0
info:
  title: Modular Simulation Engine API
  version: 0.1.0
  description: REST API for medieval economy simulation engine

servers:
  - url: http://localhost:3000/api
    description: Development server

paths:
  /health:
    get:
      summary: Health check endpoint
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  version:
                    type: string
                  uptime:
                    type: number

  /worlds:
    get:
      summary: List all worlds
      responses:
        '200':
          description: List of worlds
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/World'
    
    post:
      summary: Create new world
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorldRequest'
      responses:
        '201':
          description: World created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/World'

  /worlds/{worldId}:
    get:
      summary: Get world details
      parameters:
        - name: worldId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: World details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/World'

  /worlds/{worldId}/entities:
    get:
      summary: Get entities in world
      parameters:
        - name: worldId
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [resource_node, worker, building]
        - name: x
          in: query
          schema:
            type: number
        - name: y
          in: query
          schema:
            type: number
        - name: radius
          in: query
          schema:
            type: number
      responses:
        '200':
          description: List of entities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Entity'

  /worlds/{worldId}/commands:
    post:
      summary: Execute command in world
      parameters:
        - name: worldId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Command'
      responses:
        '200':
          description: Command executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResult'

  /recipes:
    get:
      summary: Get all recipes
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [construction, crafting, cooking, refining]
      responses:
        '200':
          description: List of recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Recipe'

  /resources:
    get:
      summary: Get all resource types
      responses:
        '200':
          description: List of resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Resource'

  /sessions:
    post:
      summary: Create game session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameSession'

  /sessions/{sessionId}/join:
    post:
      summary: Join game session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                playerId:
                  type: string
      responses:
        '200':
          description: Joined session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameSession'

components:
  schemas:
    World:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        width:
          type: number
        height:
          type: number
        seed:
          type: string
        gameTime:
          type: number
        season:
          type: string
          enum: [spring, summer, autumn, winter]
        settings:
          type: object
          properties:
            resourceRegeneration:
              type: boolean
            seasonalCycles:
              type: boolean
            cooperativeMode:
              type: boolean

    CreateWorldRequest:
      type: object
      required:
        - name
        - width
        - height
      properties:
        name:
          type: string
        width:
          type: number
          minimum: 50
          maximum: 500
        height:
          type: number
          minimum: 50
          maximum: 500
        seed:
          type: string
        settings:
          type: object

    Entity:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [resource_node, worker, building, resource_item]
        position:
          type: object
          properties:
            x:
              type: number
            y:
              type: number
        components:
          type: object
          additionalProperties: true

    Command:
      type: object
      required:
        - type
        - playerId
      properties:
        type:
          type: string
          enum: [harvest, build, assign_task, move_resources]
        playerId:
          type: string
        targetEntity:
          type: string
        targetPosition:
          type: object
          properties:
            x:
              type: number
            y:
              type: number
        data:
          type: object

    CommandResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object

    Recipe:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        inputs:
          type: array
          items:
            type: object
            properties:
              resourceId:
                type: string
              quantity:
                type: number
        outputs:
          type: array
          items:
            type: object
            properties:
              resourceId:
                type: string
              quantity:
                type: number
        duration:
          type: number
        requirements:
          type: object

    Resource:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
          enum: [food, material, tool, luxury]
        stackable:
          type: boolean
        maxStack:
          type: number
        icon:
          type: string

    GameSession:
      type: object
      properties:
        id:
          type: string
        worldId:
          type: string
        hostPlayerId:
          type: string
        players:
          type: array
          items:
            type: string
        maxPlayers:
          type: number
        status:
          type: string
          enum: [lobby, active, paused, ended]
        settings:
          type: object

    CreateSessionRequest:
      type: object
      required:
        - worldId
        - hostPlayerId
      properties:
        worldId:
          type: string
        hostPlayerId:
          type: string
        maxPlayers:
          type: number
          default: 4
        settings:
          type: object