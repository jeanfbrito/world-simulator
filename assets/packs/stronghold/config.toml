# Stronghold Pack Configuration

[pack]
name = "Stronghold Medieval"
version = "1.0.0"
author = "World Simulator Team"
description = "Castle building and siege warfare, inspired by Stronghold series"
icon = "icon.png"

[features]
# Core simulation features
z_levels = false                   # Mostly flat with some elevation
temperature_simulation = false     # Simplified seasons only
fluid_dynamics = false            # No complex water simulation
weather_system = true              # Simple weather affects crops
seasons = true                     # Affects farming and combat

# Gameplay features
complex_crafting = false          # Simplified production chains
material_properties = false       # Basic materials only
moods_and_artifacts = false      # No mood system
nobles_and_mandates = false      # Lord system instead
military_squads = true           # Knights, archers, infantry
trade_caravans = true            # Regular merchants
megabeasts = false               # No fantasy creatures
cavern_layers = false            # Surface only
adamantine = false               # No special materials

# Stronghold-specific features
castle_building = true            # Walls, towers, gates
siege_equipment = true            # Catapults, trebuchets, rams
honor_system = true               # Popularity affects efficiency
taxation = true                   # Gold-based economy
religious_buildings = true        # Churches, cathedrals
entertainment = true              # Inns, gardens, statues

[balance]
# Starting conditions
starting_population = 20
starting_supplies = 200
starting_gold = 1000
map_size = [512, 512, 1]         # Larger flat maps

# Difficulty settings
difficulty = "normal"
hostile_wildlife = false          # Focus on human enemies
siege_frequency = "monthly"
bandit_raids = true
plague_enabled = true
fire_spreading = true

# Economy
base_trade_multiplier = 1.5       # More trade-focused
value_calculation = "simple"      # Gold-based
popularity_affects_taxes = true
food_variety_bonus = true

[world_generation]
# Terrain generation
terrain_types = ["plains", "hills", "forest", "river", "mountain_pass"]
resource_deposits = ["stone", "iron", "trees", "farmland"]
castle_ruins = true               # Pre-existing structures
roads_between_settlements = true

# Factions
factions = ["your_kingdom", "rival_lords", "bandits", "merchants"]
starting_reputation = 50
diplomacy_enabled = true

[performance]
# Optimization settings
max_units = 500                   # More units for battles
update_rate = 30                  # Higher for combat
pathfinding_groups = true         # Units move in formations
simplified_los = true             # Line of sight for archers

[ui]
# Interface preferences
default_view = "isometric"
zoom_levels = [0.25, 0.5, 1.0, 2.0]
show_popularity_overlay = true
show_fear_factor = true
minimap_enabled = true
formation_templates = true